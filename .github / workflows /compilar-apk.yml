name: Compilador APK de SULIN

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - principal

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Descargar código
        uses: actions/checkout@v4

      - name: Configurar Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Configurar Android SDK
        uses: android-actions/setup-android@v3

      - name: Buscar proyecto Android
        run: |
          echo "Archivos en la raíz:"
          ls -la

          if [ -f "./gradlew" ]; then
            echo "Proyecto encontrado en la raíz"
            echo "PROJECT_DIR=." >> $GITHUB_ENV
          elif [ -f "./SulinApp/gradlew" ]; then
            echo "Proyecto encontrado dentro de SulinApp"
            echo "PROJECT_DIR=SulinApp" >> $GITHUB_ENV
          else
            echo "No se encontró gradlew"
            echo "Buscando gradlew en el repositorio..."
            find . -maxdepth 4 -name "gradlew"
            exit 1
          fi

      - name: Dar permiso a Gradle
        run: chmod +x "$PROJECT_DIR/gradlew"

      - name: Compilar APK
        run: |
          cd "$PROJECT_DIR"
          ./gradlew assembleDebug --stacktrace

      - name: Subir APK generado
        uses: actions/upload-artifact@v4
        with:
          name: APK-SULIN
          path: |
            app/build/outputs/apk/debug/*.apk
            SulinApp/app/build/outputs/apk/debug/*.apk
