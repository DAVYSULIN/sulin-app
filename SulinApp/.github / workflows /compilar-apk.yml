name: Compilador APK de SULIN

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - principal

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Descargar código
        uses: actions/checkout@v4

      - name: Configurar Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Configurar Android SDK
        uses: android-actions/setup-android@v3

      - name: Configurar Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 8.9

      - name: Verificar archivos
        run: |
          echo "Archivos en la raíz:"
          ls -la
          echo "Archivos dentro de SulinApp:"
          ls -la SulinApp

      - name: Compilar APK
        working-directory: SulinApp
        run: gradle assembleDebug --stacktrace

      - name: Subir APK generado
        uses: actions/upload-artifact@v4
        with:
          name: APK-SULIN
          path: SulinApp/app/build/outputs/apk/debug/*.apk
